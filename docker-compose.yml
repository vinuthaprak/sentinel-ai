version: "3.9"

# ─────────────────────────────────────────────────────────────────
# SentinelAI Full Stack
#
# Services:
#   sentinel   — The observability server (FastAPI + dashboard)
#   prometheus — Scrapes /metrics from sentinel (optional)
#   grafana    — Grafana dashboards pre-loaded (optional)
#
# Quick start:
#   docker compose up sentinel           # just the core
#   docker compose up                    # full stack with Prometheus + Grafana
# ─────────────────────────────────────────────────────────────────

services:

  sentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-ai
    ports:
      - "8765:8765"
    environment:
      - SENTINEL_LOG_LEVEL=INFO
      - SENTINEL_HOST=0.0.0.0
      - SENTINEL_PORT=8765
    volumes:
      - ./sentinel:/app/sentinel:ro
      - ./dashboard:/app/dashboard:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - sentinel-net

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: sentinel-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    depends_on:
      - sentinel
    restart: unless-stopped
    networks:
      - sentinel-net

  grafana:
    image: grafana/grafana:10.4.2
    container_name: sentinel-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=sentinel
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - sentinel-net

volumes:
  prometheus-data:
  grafana-data:

networks:
  sentinel-net:
    driver: bridge
