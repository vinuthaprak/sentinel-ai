---
# ClusterIP: internal access for SDK clients within the cluster
apiVersion: v1
kind: Service
metadata:
  name: sentinel-ai
  namespace: sentinel-ai
  labels:
    app.kubernetes.io/name: sentinel-ai
    app.kubernetes.io/component: server
  annotations:
    # Prometheus operator service monitor discovery
    prometheus.io/scrape: "true"
    prometheus.io/port: "8765"
spec:
  type: ClusterIP
  selector:
    app: sentinel-ai
  ports:
    - name: http
      port: 8765
      targetPort: http
      protocol: TCP

---
# NodePort (or swap to LoadBalancer for cloud): external dashboard access
apiVersion: v1
kind: Service
metadata:
  name: sentinel-ai-external
  namespace: sentinel-ai
  labels:
    app.kubernetes.io/name: sentinel-ai
    app.kubernetes.io/component: server-external
spec:
  type: NodePort
  selector:
    app: sentinel-ai
  ports:
    - name: http
      port: 8765
      targetPort: http
      nodePort: 30765
      protocol: TCP
